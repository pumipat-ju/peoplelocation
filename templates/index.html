<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CCTV Monitoring</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #28a745;
            --danger-color: #dc3545;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color); 
            color: #e0e0e0; 
            padding: 20px; 
            margin: 0;
        }

        .container { max-width: 1400px; margin: auto; }

        .form-box { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            margin-bottom: 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .form-box h3 { margin-top: 0; color: var(--accent-color); }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); 
            gap: 25px; 
        }

        .cam-card { 
            background: var(--card-bg); 
            border: 1px solid #333; 
            padding: 15px; 
            border-radius: 12px; 
            overflow: hidden;
            transition: transform 0.2s;
        }

        .cam-card:hover { transform: translateY(-5px); }

        .cam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .cam-header h4 { margin: 0; font-weight: 500; }

        .stream-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Aspect Ratio 16:9 */
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        .stream-container img { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%;
            object-fit: contain; /* แสดงภาพครบถ้วน ไม่โดนตัด */
        }

        input { 
            background: #333; 
            border: 1px solid #444; 
            color: white; 
            padding: 10px; 
            border-radius: 5px; 
            margin-bottom: 10px;
            width: 250px;
        }

        button { 
            padding: 10px 20px; 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
        }

        button:hover { opacity: 0.9; }

        .btn-delete {
            background: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            padding: 4px 8px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>People Location Tracker</h1>
            <p style="color: #888;">YOLOv8 Real-time Human Tracking (BoT-SORT)</p>
        </header>
        
        <div class="form-box">
            <h3>➕ เพิ่มกล้องใหม่</h3>
            <form action="/add_camera" method="post" style="display: flex; flex-wrap: wrap; gap: 10px;">
                <input type="text" name="name" placeholder="ชื่อกล้อง (เช่น ห้องนั่งเล่น)" required>
                <input type="text" name="url" placeholder="RTSP URL หรือ 0 (Webcam)" required>
                <button type="submit">เชื่อมต่อกล้อง</button>
            </form>
        </div>

        <div class="grid">
            {% for name, url in cameras.items() %}
            <div class="cam-card">
                <div class="cam-header">
                    <h4> {{ name }}</h4>
                    <span style="font-size: 12px; color: #666;">Live</span>
                </div>
                <div class="stream-container">
                    <img src="/video_feed/{{ name }}" alt="เชื่อมต่อไม่ได้ หรือกำลังโหลด...">
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
